# import AuthData from './AuthData.graphql'
# import User from './User.graphql'

type Query {
  login(login: String!, password: String!): AuthData
  user(slug: String): User
  users: [User]
}

type Mutation {
  createUser(
    name: String!
    surname: String!
    patronymic: String!
    login: String!
    email: String!
    password: String!
    roles: [String!]!
  ): User
}
